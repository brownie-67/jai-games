<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platformer</title>
  <link rel="stylesheet" href="../../shared/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Top bar ─── -->
  <div class="topbar">
    <a href="../../index.html">← Arcade</a>
    <h1>🪙 Platformer</h1>
  </div>

  <!-- ─── Game area ─── -->
  <div class="game-wrapper">

    <!-- HUD -->
    <div class="hud">
      <div>Level: <span id="level-val">1</span> / 5</div>
      <div>Score: <span id="score-val">0</span></div>
      <div>Lives: <span id="lives-val">5</span></div>
    </div>

    <!-- Canvas + overlay wrapper -->
    <div class="canvas-wrapper">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p  id="overlay-msg"></p>
        <button class="btn" id="overlay-btn">Start</button>
      </div>
    </div>

    <!-- Controls hint (keyboard) -->
    <p class="controls-hint keyboard-hint">
      ← → Move &nbsp;|&nbsp; ↑ / Space Jump
    </p>

    <!-- Mobile controls -->
    <div id="mobile-controls">
      <div class="mobile-row">
        <button id="btn-left"  class="mob-btn">◀</button>
        <button id="btn-jump"  class="mob-btn mob-jump">▲</button>
        <button id="btn-right" class="mob-btn">▶</button>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
