<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jai's Platformer</title>
  <link rel="stylesheet" href="../../shared/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ─── Top bar ─── -->
  <div class="topbar">
    <a href="../../index.html">← Arcade</a>
    <h1>🎮 Jai's Platformer</h1>
  </div>

  <!-- ─── Game area ─── -->
  <div class="game-wrapper">

    <!-- HUD -->
    <div class="hud">
      <div>Level: <span id="level-val">1</span> / 5</div>
      <div>Score: <span id="score-val">0</span></div>
      <div>Lives: <span id="lives-val">5</span></div>
    </div>

    <!-- Canvas + overlay wrapper -->
    <div style="position: relative; display: inline-block;">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay">
        <h2 id="overlay-title"></h2>
        <p  id="overlay-msg"></p>
        <button class="btn" id="overlay-btn">Start</button>
      </div>
    </div>

    <!-- Controls hint -->
    <p class="controls-hint">
      ← → Move &nbsp;|&nbsp; ↑ / Space Jump
    </p>

  </div>

  <script src="game.js"></script>
</body>
</html>
