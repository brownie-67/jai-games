<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KindCoins</title>
  <link rel="stylesheet" href="../../shared/style.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="topbar">
    <a href="../../index.html">← Arcade</a>
    <h1>🪙 KindCoins</h1>
  </div>

  <!-- ── HOME SCREEN ── -->
  <div id="home-screen">
    <div id="coin-hero">
      <div id="coin-hero-icon">🪙</div>
      <div id="total-coins-display">0</div>
      <div class="coin-hero-label">coins earned</div>
    </div>

    <div id="gift-card">
      <div id="gift-name-display">Tap ⚙️ to set your gift goal!</div>
      <div id="progress-track"><div id="progress-fill"></div></div>
      <div id="progress-text">0 / 300 coins</div>
    </div>

    <div id="level-grid"></div>

    <button id="parent-btn" class="btn-small">⚙️ Parent Settings</button>
  </div>

  <!-- ── GAME SCREEN ── -->
  <div id="game-screen" class="hidden">
    <div id="game-hud">
      <div id="hud-coins-wrap">🪙&nbsp;<span id="hud-coins">0</span></div>
      <div id="hud-streak"></div>
      <div id="hud-level"></div>
    </div>
    <div id="timer-track"><div id="timer-bar"></div></div>
    <div id="game-body">
      <div id="round-info"></div>
      <div id="scenario-box"><p id="scenario-text"></p></div>
      <div id="choices-wrap"></div>
    </div>
    <div id="feedback-overlay" class="hidden">
      <div id="feedback-inner">
        <div id="feedback-icon"></div>
        <div id="feedback-msg"></div>
        <div id="feedback-coins"></div>
      </div>
    </div>
    <div id="coin-pop-layer"></div>
  </div>

  <!-- ── LEVEL COMPLETE SCREEN ── -->
  <div id="level-complete-screen" class="hidden">
    <div id="lc-inner">
      <div id="lc-emoji"></div>
      <h2 id="lc-title"></h2>
      <div id="lc-stars"></div>
      <div id="lc-coins-earned"></div>
      <div id="lc-buttons"></div>
    </div>
  </div>

  <!-- ── REDEEM SCREEN ── -->
  <div id="redeem-screen" class="hidden">
    <div id="redeem-inner">
      <div id="redeem-burst"></div>
      <div id="redeem-big-emoji">🎉</div>
      <h2>You did it!</h2>
      <div id="redeem-gift-name"></div>
      <p id="redeem-msg">Show this screen to Mom or Dad to claim your gift!</p>
      <div id="redeem-total"></div>
      <button id="redeem-new-btn" class="btn">Set a New Goal →</button>
    </div>
  </div>

  <!-- ── PARENT SETTINGS MODAL ── -->
  <div id="parent-modal" class="hidden">
    <div id="parent-inner">
      <h3>⚙️ Parent Settings</h3>
      <label class="setting-row">
        <span>Gift Name</span>
        <input type="text" id="gift-name-input" placeholder="e.g. Trip to the movies" maxlength="40" />
      </label>
      <label class="setting-row">
        <span>Coin Goal</span>
        <input type="number" id="gift-target-input" min="50" max="9999" />
      </label>
      <label class="setting-row">
        <span>Reset Progress</span>
        <button id="reset-btn" class="btn-danger">Reset All</button>
      </label>
      <div id="parent-btn-row">
        <button id="parent-save-btn" class="btn">Save</button>
        <button id="parent-cancel-btn" class="btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
