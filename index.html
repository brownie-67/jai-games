<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jai's World</title>
  <link rel="stylesheet" href="shared/style.css" />
  <style>
    /* ─── Hub Page ─── */

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 56px 24px 28px;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #6C63FF, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 10px;
      font-size: 1.1rem;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(135deg, #6C63FF, #10b981);
      border-radius: 2px;
      margin: 16px auto;
    }

    /* ─── Hub Grid ─── */

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 28px;
      max-width: 760px;
      margin: 0 auto;
      padding: 20px 24px 60px;
      flex: 1;
      align-content: center;
    }

    .hub-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 40px 32px 36px;
      text-align: center;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .hub-card:hover {
      transform: translateY(-6px);
      text-decoration: none;
    }

    .hub-card:hover { text-decoration: none; }

    .games-card {
      border-color: rgba(108, 99, 255, 0.25);
    }

    .games-card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 40px rgba(108, 99, 255, 0.25);
    }

    .thrive-card {
      border-color: rgba(16, 185, 129, 0.25);
    }

    .thrive-card:hover {
      border-color: var(--thrive-accent);
      box-shadow: 0 10px 40px rgba(16, 185, 129, 0.25);
    }

    .hub-icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 4px;
    }

    .hub-card h2 {
      font-size: 1.6rem;
      color: var(--text);
    }

    .hub-card p {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .hub-cta {
      display: inline-block;
      margin-top: 8px;
      padding: 9px 22px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
    }

    .games-card .hub-cta {
      background: var(--accent);
    }

    .thrive-card .hub-cta {
      background: var(--thrive-accent);
    }

    footer {
      text-align: center;
      padding: 28px 24px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🌟 Jai's World</h1>
    <div class="divider"></div>
    <p>Games &amp; Learning — all in one place</p>
  </header>

  <div class="hub-grid">

    <a class="hub-card games-card" href="games/">
      <div class="hub-icon">🎮</div>
      <h2>Games</h2>
      <p>Fun arcade games to play and enjoy</p>
      <span class="hub-cta">Explore Games →</span>
    </a>

    <a class="hub-card thrive-card" href="thrive/">
      <div class="hub-icon">🌱</div>
      <h2>Thrive</h2>
      <p>Habit tracker, puzzles &amp; learning apps</p>
      <span class="hub-cta">Explore Thrive →</span>
    </a>

  </div>

  <footer>
    Made with ❤️ by Jai &amp; Dad
  </footer>

</body>
</html>
