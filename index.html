<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jai's Arcade</title>
  <link rel="stylesheet" href="shared/style.css" />
  <style>
    /* ─── Arcade Homepage ─── */

    header {
      text-align: center;
      padding: 48px 24px 24px;
    }

    header h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #6C63FF, #ff6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1.1rem;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(135deg, #6C63FF, #ff6584);
      border-radius: 2px;
      margin: 16px auto;
    }

    /* ─── Game Grid ─── */

    #game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .game-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(108, 99, 255, 0.2);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(108, 99, 255, 0.25);
      text-decoration: none;
    }

    .card-banner {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .card-body h2 {
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-play {
      display: inline-block;
      margin-top: 14px;
      padding: 7px 18px;
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* ─── Loading / Empty States ─── */

    .state-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 24px;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🕹️ Jai's Arcade</h1>
    <div class="divider"></div>
    <p>Pick a game and start playing!</p>
  </header>

  <div id="game-grid">
    <p class="state-msg">Loading games...</p>
  </div>

  <footer>
    Made with ❤️ by Jai &amp; Dad
  </footer>

  <script>
    async function loadGames() {
      const grid = document.getElementById('game-grid');
      try {
        const res = await fetch('games/registry.json');
        const games = await res.json();

        if (!games.length) {
          grid.innerHTML = '<p class="state-msg">No games yet — coming soon!</p>';
          return;
        }

        grid.innerHTML = games.map(g => `
          <a class="game-card" href="${g.path}">
            <div class="card-banner" style="background: ${g.color}22;">
              ${g.emoji || '🎮'}
            </div>
            <div class="card-body">
              <h2>${g.title}</h2>
              <p>${g.description}</p>
              <span class="card-play">▶ Play</span>
            </div>
          </a>
        `).join('');

      } catch (e) {
        grid.innerHTML = '<p class="state-msg">Could not load games. Make sure you are running this from a local server or GitHub Pages.</p>';
      }
    }

    loadGames();
  </script>

</body>
</html>
