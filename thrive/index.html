<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thrive – Jai's World</title>
  <link rel="stylesheet" href="../shared/style.css" />
  <style>
    /* ─── Thrive Section ─── */

    .topnav {
      padding: 16px 24px;
    }

    .topnav a {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .topnav a:hover {
      color: var(--text);
    }

    header {
      text-align: center;
      padding: 16px 24px 24px;
    }

    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--text-muted);
      margin-top: 8px;
      font-size: 1.05rem;
    }

    .divider {
      width: 60px;
      height: 4px;
      background: linear-gradient(135deg, #10b981, #06b6d4);
      border-radius: 2px;
      margin: 14px auto;
    }

    /* ─── App Grid ─── */

    #app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .app-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid rgba(16, 185, 129, 0.2);
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    .app-card:hover {
      transform: translateY(-4px);
      border-color: var(--thrive-accent);
      box-shadow: 0 8px 30px rgba(16, 185, 129, 0.25);
      text-decoration: none;
    }

    .card-banner {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
    }

    .card-body {
      padding: 16px 20px 20px;
    }

    .card-body h2 {
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-body p {
      font-size: 0.875rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card-open {
      display: inline-block;
      margin-top: 14px;
      padding: 7px 18px;
      background: var(--thrive-accent);
      color: #fff;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .state-msg {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 24px;
      grid-column: 1 / -1;
    }

    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="../">← Jai's World</a>
  </nav>

  <header>
    <h1>🌱 Thrive</h1>
    <div class="divider"></div>
    <p>Learning &amp; growing — one day at a time</p>
  </header>

  <div id="app-grid">
    <p class="state-msg">Loading apps...</p>
  </div>

  <footer>
    Made with ❤️ by Jai &amp; Dad
  </footer>

  <script>
    async function loadApps() {
      const grid = document.getElementById('app-grid');
      try {
        const res = await fetch('registry.json');
        const apps = await res.json();

        if (!apps.length) {
          grid.innerHTML = '<p class="state-msg">✨ Apps coming soon!</p>';
          return;
        }

        grid.innerHTML = apps.map(a => `
          <a class="app-card" href="${a.path}">
            <div class="card-banner" style="background: ${a.color}22;">
              ${a.emoji || '🌱'}
            </div>
            <div class="card-body">
              <h2>${a.title}</h2>
              <p>${a.description}</p>
              <span class="card-open">▶ Open</span>
            </div>
          </a>
        `).join('');

      } catch (e) {
        grid.innerHTML = '<p class="state-msg">Could not load apps. Make sure you are running this from a local server or GitHub Pages.</p>';
      }
    }

    loadApps();
  </script>

</body>
</html>
